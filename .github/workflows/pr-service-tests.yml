name: PR Service Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  linux-service-tests:
    name: Linux service tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Linux service contract tests
        run: npm run test:linux-service

  macos-service-tests:
    name: macOS service tests
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run macOS service contract tests
        run: npm run test:darwin-service
